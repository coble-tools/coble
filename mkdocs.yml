site_name: COBLE Documentation
site_description: Documentation for COBLE - COnda BuiLdEr
site_author: RSE team at ICR
repo_url: https://gitlab.com/group/collaborations/bcrbioin/coble
repo_name: icr-rse/coble

theme:
  name: material
  logo: coble.png
  favicon: coble.png
  palette:
    # Light mode
    - scheme: default
      primary: light green
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      primary: light green
      accent: pink
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search
  - mkdocstrings

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Motivation: motivation.md
  - Recipes: recipes.md
  - Conda Build: overview.md
  - Docker Build: docker-build.md
  - Container Environments: container-env.md          
  - About:
    - License: license.md
