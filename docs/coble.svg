    <!-- Top-right: bright pink -->
    <path
      fill="#FF4BCF"
      d="
        M 128 40
        C 152 40, 176 48, 192 64
        C 208 80, 216 104, 216 128
        C 216 140, 212 150, 204 160
        C 186 140, 164 124, 140 116
        C 134 114, 130 112, 128 112
        C 128 112, 128 112, 128 112
        C 128 112, 128 76, 128 40
        Z
      "
    />

    <!-- Bottom-left: orange -->
