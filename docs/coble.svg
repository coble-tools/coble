        M 40 128
        C 40 152, 48 176, 64 192
        C 80 208, 104 216, 128 216
        C 140 216, 150 212, 160 204
        C 140 186, 124 164, 116 140
        C 114 134, 112 130, 112 128
        C 112 128, 112 128, 112 128
        C 112 128, 76 128, 40 128
