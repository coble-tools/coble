      fill="#C5FF3F"
      d="
        M 128 40
        C 104 40, 80 48, 64 64
        C 48 80, 40 104, 40 128
        C 40 140, 44 150, 52 160
        C 70 140, 92 124, 116 116
        C 122 114, 126 112, 128 112
        C 128 112, 128 112, 128 112
        C 128 112, 128 76, 128 40
