    <!-- Bottom-right: magenta -->
    <path
      fill="#FF1E8A"
      d="
        M 216 128
        C 216 152, 208 176, 192 192
        C 176 208, 152 216, 128 216
        C 116 216, 106 212, 96 204
        C 116 186, 132 164, 140 140
        C 142 134, 144 130, 144 128
        C 144 128, 144 128, 144 128
        C 144 128, 180 128, 216 128
        Z
      "
