##RAE
coble:

  - environment: coble-env

channels:
# note the reverse order of priority
  - defaults
  - r
  - bioconda
  - conda-forge

languages:

flags:
  - dependencies: True
  - build-tools: True

find:
#   - TFMPvalue
found|conda:
  - r-TFMPvalue@bioconda
found|conda:
  - r-TFMPvalue@conda-forge
found|conda:
  - r-TFMPvalue@r
found|r-package:
  - TFMPvalue@CRAN
found|r-package:
  - TFMPvalue@CRAN



#   - countreg
found|r-package:
  - countreg@r-forge

#   - rust
found|conda:
  - rust@conda-forge
found|conda:
  - r-rust@r
found|r-package:
  - rust@CRAN
found|r-package:
  - rust@CRAN
found|pip:
  - rust

#   - patch
found|conda:
  - patch@conda-forge
found|pip:
  - patch

#   - gifski
found|conda:
  - gifski@conda-forge
found|conda:
  - r-gifski@conda-forge
found|conda:
  - r-gifski@r
found|r-package:
  - gifski@CRAN
found|r-package:
  - gifski@CRAN

#   - otelsdk
found|r-package:
  - otelsdk@CRAN
found|r-package:
  - otelsdk@CRAN




