# https://www.nature.com/articles/s41588-025-02108-2#code-availability
coble:
  - environment: sylver

channels:
  - conda-forge
  - r
  - bioconda
  - defaults

languages:
- r-base=4.1.0@conda-forge

flags:
  - dependencies: True
  - build-tools: true

conda-r:
  - BiocManager

bash:
  - Rscript -e 'BiocManager::install(version = "3.10")'

conda:
  - r-tidyverse
  - r-effsize
  - r-magrittr
  - r-ggplot2=3.3.5
  - r-ggrepel
  - r-VennDiagram
  - bioconductor-affy
  - bioconductor-fgsea
  - bioconductor-GSVA
  - bioconductor-org.Hs.eg.db

r-package:
  - survival=3.2-11

bioconductor:
  - limma=3.42.2
  
r-url:
  - https://github.com/broadinstitute/cdsr_models/archive/refs/heads/master.zip
    