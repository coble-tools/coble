# https://www.nature.com/articles/s41588-025-02108-2#code-availability
coble:
  - environment: sylver

channels:
  - conda-forge
  - r
  - bioconda
  - defaults

languages:
- r-base=3.6.0@r

flags:
  - dependencies: True
  - build-tools: true

conda-r:
  - BiocManager

bash:
  - Rscript -e 'BiocManager::install(version = "3.10")'

conda-bioc:
  - fgsea=1.12.0

  #- hsentrezgcdf=18
  #- cdsrmodels=0.1.0


r-github:
  - https://github.com/broadinstitute/cdsr_models/archive/refs/heads/master.zip

bioconductor:
  - limma=3.42.2

conda-r:
  - effsize=0.8.1
  - magrittr=2.0.1
  - tidyverse=1.3.1
  #- ggplots=2_3.3.5
  - ggplot2=3.3.5
  - ggrepel=0.9.1

conda-bioc:
  - org.Hs.eg.db=3.10.0

conda-r:
  - VennDiagram=1.6.20

r-package:
  - survival=3.2-11

conda-bioc:
  - affy=1.64.0
  - GSVA=1.34.0

