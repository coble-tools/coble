coble:

  - environment: syed-env

channels:
# note the reverse order of priority
  - defaults
  - r
  - bioconda
  - conda-forge

languages:
  - r-base=4.5.2@conda-forge
  - python=3.14.0@conda-forge

flags:
  - dependencies: True
  - build-tools: True

bash:
  - python -m pip install "setuptools>=59.0"
  - python -m pip install --upgrade "Cython>=3.0.11"

conda:
  - numpy

pip:
  - pysam

bash:
  # Set compiler flag to allow incompatible pointer types
  - export CFLAGS="-Wno-error=incompatible-pointer-types"
  - python -m pip install --no-build-isolation git+https://github.com/rachelicr/pysamstats.git

