#######################################
# COBLE:Reproducible environment yaml, (c) ICR 2025
#######################################

coble:

  - environment: coble-env

channels:
# note the reverse order of priority
  - defaults
  - r
  - bioconda
  - conda-forge

languages:
  - r-base=4.0.0@conda-forge
  - python=3.7.3@conda-forge

flags:
  - dependencies: True
  - build-tools: True
  
find:
  - Java
  - pandas
  - pysam
  - numpy
  - scipy
  - pillow
  - e1071
  - ggplot2
  - samtools
  - bcftools
  - beagle
  - tabix
  - bgzip
  - data.table
