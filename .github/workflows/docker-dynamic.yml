# Dynamic Docker Build workflow (generalized variants)
# Builds any docker-* tag (docker-<variant>) or multiple variants via docker-all.
# Manual dispatch allows specifying a variant.

name: Docker Build Dynamic

on:
  push:
    tags:
      - 'docker-*'
  workflow_dispatch:
    inputs:
      variant:
        description: 'Variant to build (e.g. 452, mini, tst)'
        required: true
        default: 'mini'

env:
  IMAGE_REPO: icrsc/coble
  ALL_VARIANTS: 452,mini

jobs:
  build:
    name: Build COBLE Variant(s)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine variant(s)
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "variant_list=${{ github.event.inputs.variant }}" >> $GITHUB_OUTPUT
          else
            full_ref='${{ github.ref_name }}'
            base=${full_ref#docker-}
            if [ "$base" = "all" ]; then
              echo "variant_list=${ALL_VARIANTS}" >> $GITHUB_OUTPUT
            else
              echo "variant_list=$base" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push variants
        run: |
          IFS=',' read -r -a variants <<< "${{ steps.vars.outputs.variant_list }}"
          mkdir -p action-debug
          for v in "${variants[@]}"; do
            echo "=== Building variant: $v ==="
            if [ ! -f "config/coble-$v.yml" ]; then
              echo "ERROR: config/coble-$v.yml not found" >&2
              exit 1
            fi
            docker build -f docker/Dockerfile.452 --build-arg BUILD_TAG="$v" -t $IMAGE_REPO:$v .
            docker tag $IMAGE_REPO:$v $IMAGE_REPO:$v-${{ github.sha }}
            docker push $IMAGE_REPO:$v
            docker push $IMAGE_REPO:$v-${{ github.sha }}
          done
          echo "---- Environment Variables ----" > action-debug/env.txt
          env >> action-debug/env.txt
          echo "---- Docker Images ----" > action-debug/docker-images.txt
          docker images >> action-debug/docker-images.txt 2>&1 || true

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-dynamic-${{ github.run_id }}
          path: action-debug/
          retention-days: 7
