name: Working Conda-Pytest

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test-group: 
          - set1_basic
          - set1_circle  
          - set1_docker
          - set2_small
          - set3_conda
          - set3_docker
    steps:
      - uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          echo "Disk space before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/share/swift
          sudo apt-get clean
          docker system prune -af --volumes || echo 'Warning: Docker prune failed, continuing anyway'
          echo "Disk space after cleanup:"
          df -h

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
      
      - name: Install system compiler toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gfortran

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          
      - name: Run tests for ${{ matrix.test-group }}
        run: |
          echo "Running test: ${{ matrix.test-group }}"
          df -h
          pytest --cache-clear -v tests/github/working/test_${{ matrix.test-group }}.py
          
      - name: Clean up after test
        if: always()
        run: |
          docker system prune -af --volumes || true
          docker builder prune -af || true
          rm -rf .pytest_cache
          echo "Disk space after test:"
          df -h
