# GitHub Actions workflow for building and pushing Docker images to Docker Hub
#
# Required Repository Secrets (set in Settings → Secrets and variables → Actions):
# - DOCKER_HUB_USERNAME: Your Docker Hub username
# - DOCKER_HUB_TOKEN: Docker Hub access token (create at hub.docker.com/settings/security)

name: Docker Build Deprecated

on:
  push:
    tags:
      - 'xdocker-*'   # Trigger builds only when pushing tags like docker-*
  workflow_dispatch:  # Allow manual trigger
    inputs:
      build_452:
        description: 'Build 452 image'
        type: boolean
        default: true
      build_mini:
        description: 'Build mini image'
        type: boolean
        default: true

env:
  IMAGE_REPO: icrsc/coble

jobs:
  build-452:
    name: Build 452 Image
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.build_452 == 'true') ||
      (github.event_name == 'push' && (startsWith(github.ref_name, 'docker-452') || startsWith(github.ref_name, 'docker-all')))
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push 452 image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.452
          build-args: BUILD_TAG=452
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:452
            ${{ env.IMAGE_REPO }}:452-${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_REPO }}:452
          cache-to: type=inline

      - name: Collect debug artifacts
        if: always()
        run: |
          mkdir -p ./action-debug
          echo "---- Environment Variables ----" > ./action-debug/env.txt
          env >> ./action-debug/env.txt
          echo "---- Docker Version ----" > ./action-debug/docker-info.txt
          docker version >> ./action-debug/docker-info.txt 2>&1 || true
          docker info >> ./action-debug/docker-info.txt 2>&1 || true
          echo "---- Disk Usage ----" > ./action-debug/disk-usage.txt
          df -h >> ./action-debug/disk-usage.txt 2>&1 || true
          echo "---- Docker Images ----" > ./action-debug/docker-images.txt
          docker images >> ./action-debug/docker-images.txt 2>&1 || true
          echo "---- Build Context ----" > ./action-debug/build-context.txt
          ls -lah . >> ./action-debug/build-context.txt 2>&1 || true
          ls -lah docker/ >> ./action-debug/build-context.txt 2>&1 || true

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-452-${{ github.run_id }}
          path: ./action-debug/
          retention-days: 7

  build-mini:
    name: Build Mini Image
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.build_mini == 'true') ||
      (github.event_name == 'push' && (startsWith(github.ref_name, 'docker-mini') || startsWith(github.ref_name, 'docker-all')))
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push mini image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.452
          build-args: BUILD_TAG=mini
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:mini
            ${{ env.IMAGE_REPO }}:mini-${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_REPO }}:mini
          cache-to: type=inline

      - name: Collect debug artifacts
        if: always()
        run: |
          mkdir -p ./action-debug
          echo "---- Environment Variables ----" > ./action-debug/env.txt
          env >> ./action-debug/env.txt
          echo "---- Docker Version ----" > ./action-debug/docker-info.txt
          docker version >> ./action-debug/docker-info.txt 2>&1 || true
          docker info >> ./action-debug/docker-info.txt 2>&1 || true
          echo "---- Disk Usage ----" > ./action-debug/disk-usage.txt
          df -h >> ./action-debug/disk-usage.txt 2>&1 || true
          echo "---- Docker Images ----" > ./action-debug/docker-images.txt
          docker images >> ./action-debug/docker-images.txt 2>&1 || true
          echo "---- Build Context ----" > ./action-debug/build-context.txt
          ls -lah . >> ./action-debug/build-context.txt 2>&1 || true
          ls -lah docker/ >> ./action-debug/build-context.txt 2>&1 || true

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-mini-${{ github.run_id }}
          path: ./action-debug/
          retention-days: 7
