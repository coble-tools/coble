name: Build and Push Docker Image (Manual)

on:
  workflow_dispatch:
    inputs:
      folder:
        description: 'Name of folder/institution (e.g. utils, icr...)'
        required: true
        default: 'utils'
      cbl:
        description: 'Name of cbl to build (e.g. small)'
        required: true
        default: 'small'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # No matrix needed for single input
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build Dockerfile with coble
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash code/coble build --recipe recipes/${{ github.event.inputs.folder }}/${{ github.event.inputs.cbl }}/${{ github.event.inputs.cbl }}.cbl --env ${{ github.event.inputs.cbl }} --containers docker --image ${{ secrets.DOCKER_HUB_USERNAME }}/coble:${{ github.event.inputs.folder }}-${{ github.event.inputs.cbl }}