name: Build and Push Docker Image (Manual)

on:
  workflow_dispatch:
    inputs:
      cbl:
        description: 'Name of cbl to build (e.g. small)'
        required: true
        default: small

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cbl: [${{ github.event.inputs.cbl }}]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build Dockerfile with coble
        run: |
          bash code/coble build --recipe dockerhub/${{ matrix.cbl }}.cbl --env ${{ matrix.cbl }} --containers docker --image ${{ secrets.DOCKER_HUB_USERNAME }}/coble:${{ matrix.cbl }}

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_HUB_USERNAME }}/coble:${{ matrix.cbl }}
