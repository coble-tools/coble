name: Dual Arch Docker Image (Manual)

on:
  workflow_dispatch:
    inputs:
      folder:
        description: 'Name of folder/institution (e.g. utils, icr...)'
        required: true
        default: 'utils'
      cbl:
        description: 'Name of cbl to build (e.g. small)'
        required: true
        default: 'small'

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            suffix: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      
      # Free up disk space before building
      - name: Free up disk space
        run: |
          echo "Disk space before cleanup:"
          df -h /
          
          # Remove unnecessary tools/packages
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/local/.cargo
          
          # Clean apt cache
          sudo apt-get clean
          sudo apt-get autoclean
          sudo apt-get autoremove -y
          
          # Clean docker system
          docker system prune -af --volumes || true
          
          echo "Disk space after cleanup:"
          df -h /
      
      - name: Build and push
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
          DOCKER_BUILDKIT: 1
          BUILDKIT_PROGRESS: plain
        run: |
          bash code/coble build \
            --recipe recipes/${{ github.event.inputs.folder }}/${{ github.event.inputs.cbl }}/${{ github.event.inputs.cbl }}.cbl \
            --validate recipes/${{ github.event.inputs.folder }}/${{ github.event.inputs.cbl }}/validate/validate.sh \
            --val-folder recipes/${{ github.event.inputs.folder }}/${{ github.event.inputs.cbl }}/validate \
            --env ${{ github.event.inputs.cbl }} \
            --containers docker \            
            --image ${{ secrets.DOCKER_HUB_USERNAME }}/coble:${{ github.event.inputs.folder }}-${{ github.event.inputs.cbl }}-${{ matrix.suffix }}
      
      - name: Ensure image is pushed
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/coble:${{ github.event.inputs.folder }}-${{ github.event.inputs.cbl }}-${{ matrix.suffix }}
      
      # Monitor disk space
      - name: Check disk space after build
        if: always()
        run: |
          echo "Final disk space:"
          df -h /
          echo "Docker images:"
          docker images | head -20
          echo "Docker system info:"
          docker system df
      
      # Clean up Docker artifacts after build
      - name: Cleanup Docker artifacts
        if: always()
        run: |
          docker system prune -af --volumes || true
          rm -f cbl-*.tar || true

  manifest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: Create multi-arch manifest
        run: |
          TAG=${{ secrets.DOCKER_HUB_USERNAME }}/coble:${{ github.event.inputs.folder }}-${{ github.event.inputs.cbl }}
          docker manifest create $TAG \
            ${{ secrets.DOCKER_HUB_USERNAME }}/coble:${{ github.event.inputs.folder }}-${{ github.event.inputs.cbl }}-amd64 \
            ${{ secrets.DOCKER_HUB_USERNAME }}/coble:${{ github.event.inputs.folder }}-${{ github.event.inputs.cbl }}-arm64
          docker manifest push $TAG