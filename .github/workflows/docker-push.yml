name: Build and Push Docker Image

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build Dockerfile with coble
        run: |
          bash code/coble build --recipe tests/fixtures/small.cbl --env small --containers docker --image icsrc/coble:small

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: code/coble.Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/coble:latest
