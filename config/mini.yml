##############################################################################
# YAML format for COBLE configuration
# code/coble-recipe-slurm.sh --results results/miniyml --input config/mini.yml --env miniyml --skip-errors
##############################################################################
coble:
  create:
    - miniyml
  channels:
    - defaults    
    - bioconda
    - conda-forge    
  packages:
    conda:
      - r-devtools      
    r:
      - biocmanager
      - igraph
      - rsvd
      - Seurat            
    bioc:
      - fgsea
    pip:
      - numpy
    bash:    
    - echo "Hello World"    
    r-github:
      - VanLoo-lab/ascat/ASCAT    
    r-url:
      - https://github.com/satijalab/seurat-wrappers/archive/refs/heads/master.zip
  
