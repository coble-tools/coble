#######################################
# COBLE:Reproducible environment yaml, (c) ICR 2025
#######################################

coble:

  - environment: coble-env

channels:
# note the reverse order of priority
  - defaults
  - r
  - bioconda
  - conda-forge

languages:
  - r-base=4.4.2@conda-forge
  - python=3.13.1@conda-forge

flags:
  - dependencies: True
  - build-tools: True

conda:
  - pandas

r-conda:
  - tidyverse
  - devtools
  - remotes

bioc-conda:
  - affy@bioconda

r-package:
  - survival
  
bioc-package:
  - limma

r-github:
  - seedgeorge/SQUEAK

r-url:
  - https://github.com/choisy/cutoff/archive/refs/heads/master.zip

pip:
  - numpy
  - https://github.com/ICR-RSE-Group/gitalma.git

